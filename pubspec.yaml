name: logpulse_analytics
description: A mobile analytics dashboard for centralized API logging service
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  flutter_riverpod: ^2.4.9
  
  # HTTP & API
  dio: ^5.4.0
  http: ^1.1.2
  
  # JSON & Data
  json_annotation: ^4.8.1
  freezed_annotation: ^2.4.1
  
  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.2.2
  
  # Date & Time
  intl: ^0.19.0
  timeago: ^3.6.0
  
  # Utilities
  uuid: ^4.3.1
  logger: ^2.0.2
  fl_chart: ^1.1.1
  
  # Fonts
  google_fonts: ^6.2.1

  # Icons
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  freezed: ^2.4.6
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/app_icon.png

flutter_launcher_icons:
  # Android
  android: true
  # iOS
  ios: true
  # Web
  web:
    generate: true
    image_path: assets/app_icon.png
    background_color: "#0D1117"
    theme_color: "#2D7EFF"
  # macOS
  macos:
    generate: true
    image_path: assets/app_icon.png
  # Windows
  windows:
    generate: true
    image_path: assets/app_icon.png
  # Shared icon path (Android + iOS)
  image_path: assets/app_icon.png
  # Android adaptive icon — use the full image as both foreground and keep dark bg
  adaptive_icon_background: "#0D1117"
  adaptive_icon_foreground: assets/app_icon.png
  # Remove alpha (needed for iOS)
  remove_alpha_ios: true
  # Min SDK (Android)
  min_sdk_android: 21
